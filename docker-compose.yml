services:
  energy-dashboard:
    build: .
    container_name: energy-dashboard
    ports:
      - "3030:3000"             # change left side to whatever port you want on Unraid
    restart: unless-stopped
    env_file:
      - .env                    # all config lives in .env (copy from .env.example)
    volumes:
      - ./certs:/app/certs      # Xcel TLS certs (generated by npm run setup:xcel)
      - ./emporia_tokens.json:/app/emporia_tokens.json  # Emporia auth token cache
    environment:
      - TZ=America/Chicago      # update to your timezone
