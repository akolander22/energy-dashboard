services:
  mongo:
    image: mongo:7
    container_name: energy-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  energy-dashboard:
    build: .
    container_name: energy-dashboard
    restart: unless-stopped
    ports:
      - "3030:3000"
    env_file:
      - .env
    volumes:
      - ./certs:/app/certs
      - ./emporia_tokens.json:/app/emporia_tokens.json
    environment:
      - TZ=America/Chicago
      - MONGO_URI=mongodb://mongo:27017/energy
    depends_on:
      - mongo

volumes:
  mongo-data:
